<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Machine AI</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0d0f12; color: #ffffff; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; background: #111418; border-radius: 28px; padding: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
        .header { text-align: center; margin-bottom: 24px; }
        h1 { font-size: 22px; font-weight: 800; margin: 0; text-transform: uppercase; color: #fff; letter-spacing: 1px; }
        .subtitle { font-size: 11px; color: #6c7a8c; letter-spacing: 2px; text-transform: uppercase; margin: 4px 0 0 0; }
        .card { background: #181c22; border-radius: 20px; padding: 16px; margin-bottom: 16px; border: 1px solid #222933; }
        .card-title { font-size: 12px; font-weight: 600; color: #9ab0c7; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .up-btn { background: #202730; border: 1px solid #2d3745; border-radius: 16px; padding: 18px; color: white; cursor: pointer; font-weight: bold; width: 100%; font-size: 14px; }
        input[type="text"] { width: 100%; background: #202730; border: 1px solid #2d3745; border-radius: 12px; padding: 12px; color: white; font-size: 13px; outline: none; }
        .preview-box { position: relative; background: #090b0d; border: 2px dashed #2d3745; border-radius: 16px; display: none; margin-top: 16px; justify-content: center; align-items: center; min-height: 150px; }
        .preview-box.active { display: flex; border-style: solid; }
        .preview-box img { width: 100%; max-height: 240px; object-fit: contain; display: block; border-radius: 12px; }
        .delete-btn { position: absolute; top: 12px; right: 12px; background: rgba(234, 67, 53, 0.9); border: none; border-radius: 50%; width: 32px; height: 32px; color: white; font-weight: bold; cursor: pointer; z-index: 5; }
        .generate-btn { width: 100%; background: #3b82f6; color: white; border: none; border-radius: 14px; padding: 16px; font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .generate-btn:disabled { background: #4b5563; cursor: not-allowed; }
        .result-wrapper { margin-top: 16px; background: #090b0d; border: 1px solid #2d3745; border-radius: 12px; padding: 14px; display: none; }
        .result-wrapper.active { display: block; }
        .copy-btn { background: #2d3745; color: #cbd5e1; border: none; border-radius: 6px; padding: 6px 12px; font-size: 11px; float: right; cursor: pointer; margin-left: 10px; }
        .result-text { font-size: 13px; line-height: 1.6; color: #e2e8f0; margin-top: 10px; clear: both; white-space: pre-wrap; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="color: #3b82f6; font-size: 26px; margin-bottom: 4px;">✦</div>
        <h1>Prompt Machine AI</h1>
        <div class="subtitle">By Bayu Aghaskara</div>
    </div>

    <div class="card">
        <div class="card-title">1. Masukkan API Key</div>
        <input type="text" id="apiKeyInput" placeholder="Tempel Gemini API Key Anda">
    </div>

    <div class="card">
        <div class="card-title">2. Pilih Gambar</div>
        <button class="up-btn" id="uploadButton">📷 PILIH DARI GALERI</button>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        
        <div class="preview-box" id="previewBox">
            <button class="delete-btn" id="clearBtn">X</button>
            <div id="previewContent" style="width: 100%;"></div>
        </div>
    </div>

    <button class="generate-btn" id="genBtn" disabled>GENERATE VIDEO PROMPT</button>

    <div class="result-wrapper" id="resultWrapper">
        <button class="copy-btn" id="copyBtn">Copy</button>
        <div style="font-size: 11px; color: #6c7a8c; font-weight: bold; text-transform: uppercase;">Hasil Prompt Video:</div>
        <p class="result-text" id="resultText"></p>
    </div>
</div>

<script type="module">
    import { GoogleGenAI } from '@google/generative-ai';

    const uploadButton = document.getElementById('uploadButton');
    const imageInput = document.getElementById('imageInput');
    const genBtn = document.getElementById('genBtn');
    const clearBtn = document.getElementById('clearBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const resultText = document.getElementById('resultText');
    const resultWrapper = document.getElementById('resultWrapper');
    const copyBtn = document.getElementById('copyBtn');

    let base64Data = "";
    let mimeType = "";

    // Pemicu input file saat tombol diklik
    uploadButton.addEventListener('click', () => {
        imageInput.click();
    });

    // Menangani pemilihan file (PREVIEW SEKARANG DIJAMIN MUNCUL)
    imageInput.addEventListener('change', function(input) {
        const file = input.target.files[0];
        if (file) {
            mimeType = file.type;
            const reader = new FileReader();
            reader.onload = function(e) {
                base64Data = e.target.result.split(',')[1];
                
                const previewContent = document.getElementById('previewContent');
                previewContent.innerHTML = `<img src="${e.target.result}">`;
                
                document.getElementById('previewBox').classList.add('active');
                genBtn.disabled = false;
            }
            reader.readAsDataURL(file);
        }
    });

    // Menghapus preview
    clearBtn.addEventListener('click', function() {
        imageInput.value = '';
        document.getElementById('previewContent').innerHTML = '';
        document.getElementById('previewBox').classList.remove('active');
        genBtn.disabled = true;
        base64Data = "";
    });

    // Menghasilkan prompt menggunakan AI
    genBtn.addEventListener('click', async function() {
        const apiKey = apiKeyInput.value.trim();
        
        if (!apiKey) { alert("Silakan masukkan API Key Gemini terlebih dahulu!"); return; }

        genBtn.innerText = "MENGANALISIS GAMBAR...";
        genBtn.disabled = true;
        resultWrapper.classList.add('active');
        resultText.innerText = "Kecerdasan Buatan sedang membaca detail gambar Anda...";

        const instruksi = "Analyze this image and write a highly detailed, descriptive video generation prompt in English for tools like Runway, Luma, or Kling. Describe the character, clothing, pose, expression, and background environment exactly. Suggest a cinematic camera movement (like slow pan, zoom in, or tracking shot) that would make this static scene beautiful as a video. Output only the prompt text.";

        try {
            // Menggunakan library resmi Google AI (Bebas CORS)
            const ai = new GoogleGenAI({ apiKey: apiKey });
            const model = ai.getGenerativeModel({ model: 'gemini-1.5-flash' });
            
            const imagePart = {
                inlineData: {
                    data: base64Data,
                    mimeType: mimeType
                }
            };

            const result = await model.generateContent([instruksi, imagePart]);
            const response = await result.response;
            const promptFinal = response.text().trim();
            resultText.innerText = promptFinal;

        } catch (e) {
            console.error(e);
            resultText.innerText = "Gagal memproses gambar. Pastikan API Key Anda benar atau coba gambar lain.";
        } finally {
            genBtn.innerText = "GENERATE VIDEO PROMPT";
            genBtn.disabled = false;
        }
    });

    // Fitur Copy
    copyBtn.addEventListener('click', function() {
        if (resultText.innerText && !resultText.innerText.startsWith("Kecerdasan")) {
            navigator.clipboard.writeText(resultText.innerText);
            alert("Prompt berhasil disalin!");
        }
    });
</script>
</body>
</html>
